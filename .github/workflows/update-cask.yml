name: Update Homebrew Cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ github.event.release.tag_name }}" -p "ClipMoar.app.zip"

      - name: Update cask formula
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          SHA=$(shasum -a 256 ClipMoar.app.zip | awk '{print $1}')
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/clipmoar.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" Casks/clipmoar.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/clipmoar.rb
          git commit -m "Update cask to ${{ github.event.release.tag_name }}"
          git push
